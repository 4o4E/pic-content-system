name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pic_content_system?schema=public

      - name: Validate Prisma schema
        run: pnpm prisma:validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pic_content_system?schema=public

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
