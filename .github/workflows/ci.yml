name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pic_content_system_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U test -d pic_content_system_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:55432/pic_content_system_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Validate Prisma schema
        run: pnpm prisma:validate
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run unit tests
        run: pnpm test

      - name: Apply database migrations
        run: pnpm --filter @pic/backend exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run database tests
        run: pnpm test:db
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Assemble release dist
        run: pnpm release:dist

      - name: Build release Docker image
        run: docker build -t pic-content-system:ci dist/release/pic-content-system

      - name: Smoke test release Docker image
        shell: bash
        run: |
          docker run -d --rm --name pic-content-system-ci \
            -e ACCESS_TOKEN=test \
            -e RUN_MIGRATIONS=false \
            -p 3000:3000 \
            pic-content-system:ci
          trap 'docker stop pic-content-system-ci' EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/ | grep -q '<!doctype html>'
