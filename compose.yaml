services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pic_content_system}
      POSTGRES_USER: ${POSTGRES_USER:-pic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pic_content_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-pic-content-system:local}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pic}:${POSTGRES_PASSWORD:-pic_content_password}@db:5432/${POSTGRES_DB:-pic_content_system}?schema=public
      ACCESS_TOKEN: ${ACCESS_TOKEN:?必须配置 ACCESS_TOKEN}
      FILES_DIR: /data/files
      PORT: 3000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    volumes:
      - media_files:/data/files
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_files:
